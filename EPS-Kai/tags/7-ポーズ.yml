大まかなポーズ（基本）:
  立つ: "standing, standing posture"
  座る: "sitting, sitting posture"
  横たわる: "lying, lying down"
  しゃがむ: "crouching, squatting"

立ちポーズのバリエーション:
  立ち絵（基本）: "tachi-e, full body standing"
  ナチュラルな立ち姿: "contrapposto, natural standing pose"
  背伸び: "standing on tiptoe, tiptoe pose"
  片足立ち: "standing on one leg, one-leg stand"

座りポーズのバリエーション:
  正座: "seiza, kneeling on floor"
  あぐら（胡坐）: "indian style, cross-legged sitting"
  アヒル座り: "w-sitting, wariza"
  体育座り: "knees up, hugging knees"

寝そべりポーズのバリエーション:
  仰向け: "lying on back, supine"
  うつ伏せ: "lying on stomach, prone"
  横寝: "lying on side, side position"
  ベッドで寝る: "sleepy, resting in bed"

上半身・腕のポーズ:
  腕を組む: "fold arms, crossed arms"
  手を振る: "wave hand, waving"
  ダブルピース: "double v, peace sign"
  頬に手を当てる: "finger to cheek, hand on own cheek"

下半身・脚のポーズ:
  開脚: "spread legs, legs apart"
  足を閉じる: "knees together feet apart"
  足組み: "crossed legs, leg cross"
  ハイキック: "high-kick, high-kick pose"

二人・接近シチュエーション:
  抱き合う: "hug, embrace each other"
  背中合わせ: "back to back, standing back-to-back"
  馬乗り: "straddling, sit astride"
  キス: "kiss, kissing"

特殊・演出ポーズ:
  自撮り: "selfie, holding camera"
  見上げる: "looking up, gazing upwards"
  見下ろす: "looking down, gazing downwards"
  振り向き: "turning around, looking back"